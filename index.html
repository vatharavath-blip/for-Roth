<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Roth ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dark-red: #2c0005; --deep-rose: #800020; --pink-neon: #ff4d6d; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle, var(--deep-rose) 0%, var(--dark-red) 100%); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Poppins', sans-serif; }
        .heart-bg { position: absolute; color: var(--pink-neon); pointer-events: none; z-index: 1; animation: floatUp linear forwards; opacity: 0.5; }
        @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; } 100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; } }
        .card { position: relative; z-index: 10; width: 88%; max-width: 380px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border-radius: 25px; padding: 30px 20px; text-align: center; border: 1px solid rgba(255, 77, 109, 0.3); box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        .name-label { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--pink-neon); margin-bottom: 5px; text-shadow: 0 0 10px rgba(255, 77, 109, 0.5); }
        #typing-area { text-align: left; font-size: 0.88rem; line-height: 1.7; color: #f0f0f0; min-height: 300px; margin-bottom: 20px; overflow-y: auto; padding-right: 5px; }
        #typing-area::-webkit-scrollbar { width: 3px; }
        #typing-area::-webkit-scrollbar-thumb { background: var(--pink-neon); border-radius: 10px; }
        .btn-start, .btn-next { background: var(--pink-neon); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 0 15px rgba(255, 77, 109, 0.4); transition: 0.3s; }
        .btn-next { display: none; background: transparent; border: 1px solid var(--pink-neon); color: var(--pink-neon); margin-top: 10px; }
        #final-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-red); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <audio id="mySong" loop preload="auto">
        <source src="https://files.catbox.moe/6v0mms.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="main-card">
        <h1 class="name-label">Roth</h1>
        <div id="typing-area">
            <p style="text-align: center; color: var(--pink-neon); margin-top: 100px;" id="hint">Click to read my heart... ❤️</p>
        </div>
        <button class="btn-start" id="start-btn" onclick="startEverything()">READ MY MESSAGE 🎵</button>
        <button class="btn-next" id="next-btn" onclick="showFinal()">NEXT</button>
    </div>

    <div id="final-screen">
        <div style="font-size: 80px;">💖</div>
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--pink-neon); margin: 20px 0;">Roth, will you be mine?</h2>
        <button class="btn-start" style="width: auto; padding: 10px 40px;" onclick="location.reload()">Back</button>
    </div>

    <script>
        // សារដែលបញ្ជូលគ្នាបានយ៉ាងល្អ
        const message = "Hey Roth, I spent 4 nights building this just to show you how much I care. Even though I didn't know anything about coding, I struggled and stayed up late every night, fixing countless errors and trying to make everything perfect for you. I know in the past I was too young and made mistakes, but those 4 days of hard work taught me how much you truly mean to me. Every time I felt like giving up, the thought of you kept me going. I've changed, and my feelings for you have only grown stronger. I'm ready to be the man you deserve and I'll never let you go again. Will you give us one more chance? ❤️";
        
        let i = 0;

        function startEverything() {
            const song = document.getElementById("mySong");
            song.volume = 0.5;
            song.play().catch(e => { song.play(); });

            document.getElementById('hint').style.display = 'none';
            document.getElementById('start-btn').style.display = 'none';
            typeWriter();
        }

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("typing-area").innerHTML += message.charAt(i);
                i++;
                // ឱ្យវា Scroll ចុះក្រោមអូតូពេលអក្សរវែង
                const area = document.getElementById("typing-area");
                area.scrollTop = area.scrollHeight;
                setTimeout(typeWriter, 50); 
            } else {
                document.getElementById('next-btn').style.display = 'block';
            }
        }

        function showFinal() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
